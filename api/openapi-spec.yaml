openapi: 3.1.1
info:
  title: URL Shortener API
  summary: HTTP API for creating and resolving shortened links.
  description: >-
    REST API exposed by the URL Shortener microservice.
    This specification is generated from the currently implemented HTTP delivery layer.
  version: 1.0.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Short Links
    description: URL shortener operations
  - name: Monitoring
    description: Service monitoring endpoints
  - name: Documentation
    description: API documentation endpoint
paths:
  /api/shortener:
    post:
      tags:
        - Short Links
      operationId: createShortLink
      summary: Create a short link
      description: Creates a short link from a long URL.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        description: Request payload for short link creation.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortenerCreateRequest'
      responses:
        '201':
          description: Short link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortenerCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/shortener/{linkKey}:
    delete:
      tags:
        - Short Links
      operationId: deleteShortLink
      summary: Delete a short link
      description: Deletes a short link by key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LinkKeyPathParam'
      responses:
        '204':
          description: Short link deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/shortener/{linkKey}/redirect:
    get:
      tags:
        - Short Links
      operationId: redirectByShortLink
      summary: Redirect to original URL
      description: >-
        Resolves the key and returns an HTTP redirect.
        If the key is not found, redirects to a configured fallback URL.
      parameters:
        - $ref: '#/components/parameters/LinkKeyPathParam'
      responses:
        '302':
          description: Redirect response.
          headers:
            Location:
              description: Redirect target URL.
              schema:
                type: string
                format: uri
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/shortener/{linkKey}/expand:
    get:
      tags:
        - Short Links
      operationId: expandShortLink
      summary: Resolve original URL without redirect
      description: Returns the original URL for the provided short link key.
      parameters:
        - $ref: '#/components/parameters/LinkKeyPathParam'
      responses:
        '200':
          description: Short link expanded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpandResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/shortener/{linkKey}/stats:
    get:
      tags:
        - Short Links
      operationId: getShortLinkStats
      summary: Get short link stats
      description: Returns usage stats for a short link key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LinkKeyPathParam'
      responses:
        '200':
          description: Stats fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /health:
    get:
      tags:
        - Monitoring
      operationId: getHealth
      summary: Health check
      description: >-
        Returns dependency health details. Status is `200` when all dependencies are healthy,
        otherwise `500`.
      responses:
        '200':
          description: All dependencies healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: At least one dependency unhealthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /openapi-spec.yaml:
    get:
      tags:
        - Documentation
      operationId: downloadOpenApiSpec
      summary: Download OpenAPI specification
      description: Returns this OpenAPI specification file.
      responses:
        '200':
          description: OpenAPI specification file.
          content:
            application/yaml:
              schema:
                type: string
            text/yaml:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token

  parameters:
    LinkKeyPathParam:
      name: linkKey
      in: path
      required: true
      description: Unique short link key.
      schema:
        type: string
        minLength: 1
      example: XcNRfg

  responses:
    BadRequestError:
      description: Invalid request payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid-json:
              summary: Malformed request body
              value:
                error: Invalid JSON.
            invalid-url:
              summary: URL validation failed
              value:
                error: Invalid URL.

    UnauthorizedError:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing-token:
              value:
                error: The auth token is missing.
            invalid-header:
              value:
                error: Invalid Authorization header.
            invalid-token:
              value:
                error: Invalid token.

    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Link not found.

    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: Internal server error.

  schemas:
    ShortenerCreateRequest:
      type: object
      description: Payload used for short link creation.
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          description: URL to shorten.
          example: https://mybusiness.com/blog/very-long-slug-3
      required:
        - url

    ShortenerCreateResponse:
      type: object
      description: Successfully created short link.
      additionalProperties: false
      properties:
        short_url:
          type: string
          format: uri
          description: Fully qualified short URL.
          example: https://example.com/s/XcNRfg
        key:
          type: string
          description: Generated short link key.
          example: XcNRfg
      required:
        - short_url
        - key

    ExpandResponse:
      type: object
      description: Expanded original URL.
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          description: Original destination URL.
          example: https://mybusiness.com/blog/very-long-slug-3
      required:
        - url

    StatsResponse:
      type: object
      description: Usage details for a short link.
      additionalProperties: false
      properties:
        hits:
          type: integer
          format: int64
          minimum: 0
          description: Number of redirect hits.
          example: 42
        created_at:
          type: string
          format: date-time
          description: UTC timestamp when the short link was created.
          example: '2026-03-13T10:24:53Z'
      required:
        - hits
        - created_at

    ServiceHealth:
      type: object
      description: Health details for one dependency.
      additionalProperties: false
      properties:
        name:
          type: string
          description: Dependency name.
          example: redis
        healthy:
          type: boolean
          description: Whether the dependency is healthy.
          example: true
        check_duration:
          type: string
          description: Duration of the health check execution.
          example: 309.576us
        error:
          type: string
          description: Error message for unhealthy dependency.
          example: Connection timeout (1000 ms).
      required:
        - name
        - healthy
        - check_duration

    HealthResponse:
      type: object
      description: Health report for the service and dependencies.
      additionalProperties: false
      properties:
        all_healthy:
          type: boolean
          description: True when all dependencies are healthy.
          example: true
        services:
          type: array
          description: Health details for each dependency.
          items:
            $ref: '#/components/schemas/ServiceHealth'
        server_time:
          type: string
          format: date-time
          description: Server-side timestamp when the check response was generated.
          example: '2026-03-13T11:01:07Z'
      required:
        - all_healthy
        - services
        - server_time

    ErrorResponse:
      type: object
      description: Error response payload.
      additionalProperties: false
      properties:
        error:
          type: string
          description: Error message.
          example: Problem description.
      required:
        - error